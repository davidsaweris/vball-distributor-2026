<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vball Distributor 2026</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 10px; background: #f4f4f9; }
        h2 { color: #2c3e50; text-align: center; }
        .setup-section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #ddd; }
        input[type="text"], input[type="number"] { width: 90%; padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
        select { padding: 5px; border-radius: 4px; }
        button { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; }
        button:hover { background: #2980b9; }
        .teams-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 30px; }
        .team-box { background: white; padding: 15px; border-radius: 8px; border-top: 5px solid #3498db; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .team-box h3 { margin-top: 0; display: flex; justify-content: space-between; font-size: 1rem; }
        .score-badge { font-size: 0.8rem; background: #e0e0e0; padding: 2px 6px; border-radius: 10px; }
        .player-list { list-style: none; padding: 0; }
        .player-list li { font-size: 0.9rem; padding: 4px 0; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; }
        .player-weight { color: #7f8c8d; font-size: 0.8rem; }
    </style>
</head>
<body>

    <h2>🏐 Volleyball Team Distributor</h2>

    <div class="setup-section">
        <p>Assign players to tiers and fine-tune their points (e.g., Tier 1 is 7pts, but you can set a player to 6.8).</p>
        <table id="playerTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Player Name</th>
                    <th>Tier (Base)</th>
                    <th>Custom Points</th>
                </tr>
            </thead>
            <tbody id="playerRows">
                </tbody>
        </table>
        <button onclick="distributeTeams()">Generate Balanced Teams</button>
    </div>

    <div id="teamsOutput" class="teams-container"></div>

    <script>
        const TIER_POINTS = { 1: 7, 2: 6, 3: 5, 4: 4, 5: 3, 6: 2, 7: 1 };
        const TOTAL_PLAYERS = 28; // 4 teams of 7 players

        // Initialize Table Rows
        const tbody = document.getElementById('playerRows');
        for (let i = 1; i <= TOTAL_PLAYERS; i++) {
            const row = document.createElement('tr');
            // Default Tiering: 4 players per tier
            const defaultTier = Math.ceil(i / 4);
            row.innerHTML = `
                <td>${i}</td>
                <td><input type="text" placeholder="Player ${i}" id="name-${i}"></td>
                <td>
                    <select id="tier-${i}" onchange="updateDefaultPoints(${i})">
                        ${[1,2,3,4,5,6,7].map(t => `<option value="${t}" ${t === defaultTier ? 'selected' : ''}>Tier ${t}</option>`).join('')}
                    </select>
                </td>
                <td><input type="number" step="0.1" value="${TIER_POINTS[defaultTier]}" id="points-${i}"></td>
            `;
            tbody.appendChild(row);
        }

        function updateDefaultPoints(id) {
            const tier = document.getElementById(`tier-${id}`).value;
            document.getElementById(`points-${id}`).value = TIER_POINTS[tier];
        }

        function distributeTeams() {
            const players = [];
            for (let i = 1; i <= TOTAL_PLAYERS; i++) {
                const name = document.getElementById(`name-${i}`).value || `Player ${i}`;
                const points = parseFloat(document.getElementById(`points-${i}`).value) || 0;
                players.push({ name, points });
            }

            // Sort players descending by points
            players.sort((a, b) => b.points - a.points);

            // Greedy Distribution into 4 teams
            const teams = [
                { players: [], totalPoints: 0 },
                { players: [], totalPoints: 0 },
                { players: [], totalPoints: 0 },
                { players: [], totalPoints: 0 }
            ];

            players.forEach(player => {
                // Find the team with the lowest current total points
                teams.sort((a, b) => a.totalPoints - b.totalPoints);
                teams[0].players.push(player);
                teams[0].totalPoints += player.points;
            });

            renderTeams(teams);
        }

        function renderTeams(teams) {
            const container = document.getElementById('teamsOutput');
            container.innerHTML = '';

            teams.forEach((team, index) => {
                const box = document.createElement('div');
                box.className = 'team-box';
                box.innerHTML = `
                    <h3>Team ${index + 1} <span class="score-badge">${team.totalPoints.toFixed(1)} pts</span></h3>
                    <ul class="player-list">
                        ${team.players.map(p => `<li>${p.name} <span class="player-weight">${p.points.toFixed(1)}</span></li>`).join('')}
                    </ul>
                `;
                container.appendChild(box);
            });
        }
    </script>
</body>
</html>
