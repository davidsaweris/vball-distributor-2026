<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Volleyball Team Balancer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 15px; margin: 0; padding-bottom: 80px; }
        h2 { text-align: center; color: #1a1a1a; }
        textarea { width: 100%; height: 60px; border-radius: 8px; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; font-size: 16px; }
        .tier-box { background: white; border: 2px dashed #cbd5e0; border-radius: 10px; min-height: 80px; padding: 10px; margin-bottom: 10px; }
        .tier-box h3 { margin: 0 0 8px 0; font-size: 12px; text-transform: uppercase; color: #718096; }
        .player-item {
            background: #007aff; color: white; padding: 10px; margin: 5px 0; border-radius: 8px; 
            font-size: 14px; font-weight: bold; display: flex; justify-content: space-between; align-items: center;
        }
        .player-pts { width: 45px; background: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.5); color: white; border-radius: 4px; text-align: center; }
        button { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 18px; font-weight: bold; margin: 10px 0; cursor: pointer; }
        .util-btn { background: #17a2b8; font-size: 14px; margin: 5px 0; }
        .copy-btn { background: #007aff; }
        .clear-btn { background: #dc3545; margin-top: 20px; }
        .team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .team-card { background: white; border-top: 4px solid #28a745; padding: 10px; border-radius: 8px; min-height: 100px; }
        
        /* New Permanent Output Area */
        #output-area { background: #333; color: white; padding: 15px; border-radius: 12px; margin-top: 30px; display: none; }
        #outputText { width: 100%; height: 150px; background: #eee; color: #000; font-family: monospace; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>🏐 Vball Balancer</h2>

    <div id="tier-view">
        <textarea id="nameInput" placeholder="Paste names (comma separated)..." oninput="updateList()"></textarea>
        <div id="unassigned" class="tier-box" style="margin-top:15px; border-style: solid; border-color: #007aff;">
            <h3>Unassigned</h3><div id="player-pool"></div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="tier-box" data-pts="7"><h3>Tier 1 (7)</h3><div id="t1"></div></div>
            <div class="tier-box" data-pts="6"><h3>Tier 2 (6)</h3><div id="t2"></div></div>
            <div class="tier-box" data-pts="5"><h3>Tier 3 (5)</h3><div id="t3"></div></div>
            <div class="tier-box" data-pts="4"><h3>Tier 4 (4)</h3><div id="t4"></div></div>
            <div class="tier-box" data-pts="3"><h3>Tier 5 (3)</h3><div id="t5"></div></div>
            <div class="tier-box" data-pts="2"><h3>Tier 6 (2)</h3><div id="t6"></div></div>
        </div>
        <div class="tier-box" data-pts="1"><h3>Tier 7 (1)</h3><div id="t7"></div></div>

        <button onclick="generateTeams()">Generate Teams</button>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="util-btn" onclick="exportData()">📤 Export Code</button>
            <button class="util-btn" onclick="importData()">📥 Import Code</button>
        </div>
        <button class="clear-btn" onclick="clearAllData()">🗑️ Clear Everything</button>
    </div>

    <div id="final-area" style="display:none;">
        <div id="results" class="team-grid"></div>
        <button class="copy-btn" onclick="copyTeamsList()">📋 Get Clean Text List</button>
        <button style="background:#6c757d" onclick="location.reload()">⬅️ Back to Tiers</button>
    </div>

    <div id="output-area">
        <h4 id="outputHeader" style="margin:0">Output Area</h4>
        <p style="font-size:11px; margin:5px 0;">Select and copy the text below:</p>
        <textarea id="outputText" readonly onclick="this.select()"></textarea>
        <button style="background:#555; padding:8px; font-size:14px;" onclick="document.getElementById('output-area').style.display='none'">Hide Area</button>
    </div>

    <script>
        let currentTeams = [[],[],[],[]];
        const zones = ['player-pool','t1','t2','t3','t4','t5','t6','t7'];

        window.onload = function() {
            const saved = localStorage.getItem('vball_v5');
            if (saved) loadObj(JSON.parse(saved));
        };

        function save() {
            const state = { inputText: document.getElementById('nameInput').value, players: [] };
            zones.forEach(z => {
                Array.from(document.getElementById(z).children).forEach(el => {
                    state.players.push({ name: el.querySelector('span').innerText, pts: parseFloat(el.querySelector('.player-pts').value), zoneId: z });
                });
            });
            localStorage.setItem('vball_v5', JSON.stringify(state));
            return state;
        }

        function loadObj(data) {
            document.getElementById('nameInput').value = data.inputText || "";
            zones.forEach(z => document.getElementById(z).innerHTML = "");
            data.players.forEach(p => {
                const div = document.createElement('div');
                div.className = 'player-item';
                div.innerHTML = `<span>${p.name}</span><input type="number" step="0.1" value="${p.pts}" class="player-pts" onchange="save()">`;
                document.getElementById(p.zoneId).appendChild(div);
            });
        }

        function updateList() {
            const current = Array.from(document.querySelectorAll('.player-item span')).map(s => s.innerText.toLowerCase());
            const input = document.getElementById('nameInput').value.split(',').filter(n => n.trim() !== "");
            input.forEach(n => {
                if (!current.includes(n.trim().toLowerCase())) {
                    const div = document.createElement('div');
                    div.className = 'player-item';
                    div.innerHTML = `<span>${n.trim()}</span><input type="number" step="0.1" value="1" class="player-pts" onchange="save()">`;
                    document.getElementById('player-pool').appendChild(div);
                }
            });
            save();
        }

        zones.forEach(id => {
            new Sortable(document.getElementById(id), { group: 'vball', animation: 150, onEnd: save });
        });

        function exportData() {
            const code = btoa(JSON.stringify(save()));
            document.getElementById('outputHeader').innerText = "📤 Export Code Below";
            document.getElementById('outputText').value = code;
            document.getElementById('output-area').style.display = 'block';
            window.scrollTo(0, document.body.scrollHeight);
        }

        function copyTeamsList() {
            let txt = "🏐 TONIGHT'S TEAMS 🏐\n\n";
            currentTeams.forEach((t, i) => {
                txt += `TEAM ${i+1}:\n${t.map(p => p.name).join('\n')}\n\n`;
            });
            document.getElementById('outputHeader').innerText = "📋 Clean Team List Below";
            document.getElementById('outputText').value = txt;
            document.getElementById('output-area').style.display = 'block';
            window.scrollTo(0, document.body.scrollHeight);
        }

        function importData() {
            const code = prompt("Paste code:");
            if (code) { 
                try { loadObj(JSON.parse(atob(code))); save(); alert("Done!"); } 
                catch(e) { alert("Error"); }
            }
        }

        function clearAllData() { if(confirm("Clear all?")) { localStorage.removeItem('vball_v5'); location.reload(); } }

        function generateTeams() {
            let players = [];
            for(let i=1; i<=7; i++) {
                Array.from(document.getElementById('t'+i).children).forEach(el => {
                    players.push({ name: el.querySelector('span').innerText, pts: parseFloat(el.querySelector('.player-pts').value) });
                });
            }
            players.sort(() => Math.random() - 0.5).sort((a,b) => b.pts - a.pts);
            currentTeams = [[],[],[],[]];
            let scores = [0,0,0,0];
            players.forEach(p => {
                let idx = scores.indexOf(Math.min(...scores));
                currentTeams[idx].push(p);
                scores[idx] += p.pts;
            });
            document.getElementById('tier-view').style.display = 'none';
            document.getElementById('final-area').style.display = 'block';
            const res = document.getElementById('results');
            res.innerHTML = '';
            currentTeams.forEach((t, i) => {
                const card = document.createElement('div');
                card.className = 'team-card';
                card.innerHTML = `<b>Team ${i+1}</b><br><small>${t.map(p => p.name).join('<br>')}</small>`;
                res.appendChild(card);
            });
        }
    </script>
</body>
</html>
